# AI Diary API — nginx 리버스 프록시 (EC2)
# 배치: /etc/nginx/sites-available/aidiary-api.conf → sites-enabled 심링크 → certbot으로 TLS
# certbot --nginx -d aidiary-api.samshintalk.com 하면 443/인증서 블록은 자동 추가됨.
server {
    listen 80;
    server_name aidiary-api.samshintalk.com;

    # 사진 업로드 허용 크기
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 대화 스트리밍(AI SDK SSE) — 버퍼링 끄고 타임아웃 길게
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
